name: build-factorio-image

on:
  workflow_dispatch:
    inputs:
      factorio_version:
        description: Optional Factorio version override for this run
        required: false
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Factorio branch
        uses: actions/checkout@v4
        with:
          ref: game/factorio

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Factorio version
        id: factorio_version
        run: |
          set -euo pipefail
          FACTORIO_VERSION="${{ inputs.factorio_version }}"
          if [ -z "$FACTORIO_VERSION" ]; then
            FACTORIO_VERSION="$(./scripts/get-factorio-version.sh)"
          fi
          echo "FACTORIO_VERSION=$FACTORIO_VERSION"
          echo "version=$FACTORIO_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          no-cache: true
          push: true
          build-args: |
            FACTORIO_VERSION=${{ steps.factorio_version.outputs.version }}
          tags: |
            martingwheeler/factorio:latest
            martingwheeler/factorio:${{ steps.factorio_version.outputs.version }}
