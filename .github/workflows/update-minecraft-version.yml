name: update-minecraft-version

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Minecraft branch
        uses: actions/checkout@v4
        with:
          ref: game/minecraft
          fetch-depth: 0
          token: ${{ secrets.BRANCH_PUSH_TOKEN }}

      - name: Update pinned Minecraft and Paper versions
        run: ./scripts/update-minecraft-version.sh

      - name: Commit version bump
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No version change detected"
            exit 0
          fi

          version="$(./scripts/get-minecraft-version.sh)"
          build="$(./scripts/get-paper-build.sh)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .minecraft.env
          git commit -m "chore: bump Minecraft ${version} and Paper build ${build}"
          git push origin HEAD:game/minecraft
