name: ci

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine TERRARIA_VERSION
        id: terraria_version
        run: |
          set -euo pipefail
          DEFAULT_VERSION=1456
          if [ -f .terraria.env ]; then
            # shellcheck disable=SC1091
            source .terraria.env
          fi
          TERRARIA_VERSION=${TERRARIA_VERSION:-$DEFAULT_VERSION}
          echo "TERRARIA_VERSION=$TERRARIA_VERSION"
          echo "::set-output name=version::$TERRARIA_VERSION"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          no-cache: true
          push: true
          build-args: |
            TERRARIA_VERSION=${{ steps.terraria_version.outputs.version }}
          tags: |
            martingwheeler/terraria:latest
            martingwheeler/terraria:${{ steps.terraria_version.outputs.version }}
