name: ci

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine FACTORIO_VERSION
        id: factorio_version
        run: |
          set -euo pipefail
          FACTORIO_VERSION="$(./scripts/get-factorio-version.sh)"
          echo "FACTORIO_VERSION=$FACTORIO_VERSION"
          echo "version=$FACTORIO_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          no-cache: true
          push: true
          build-args: |
            FACTORIO_VERSION=${{ steps.factorio_version.outputs.version }}
          tags: |
            servertimeio/factorio:latest
            servertimeio/factorio:${{ steps.factorio_version.outputs.version }}
