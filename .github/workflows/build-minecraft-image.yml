name: build-minecraft-image

on:
  workflow_dispatch:
    inputs:
      variant:
        description: Loader to build
        required: true
        default: paper
        type: choice
        options:
          - paper
          - fabric
          - forge

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Minecraft branch
        uses: actions/checkout@v4
        with:
          ref: game/minecraft

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load version pins
        id: pins
        shell: bash
        run: |
          set -euo pipefail
          variant="${{ inputs.variant }}"
          env_file=".minecraft.${variant}.env"
          source "${env_file}"

          case "${variant}" in
            paper)
              echo "dockerfile=game/minecraft/paper/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "build_args<<EOF" >> "$GITHUB_OUTPUT"
              echo "MINECRAFT_VERSION=${MINECRAFT_VERSION}" >> "$GITHUB_OUTPUT"
              echo "PAPER_BUILD=${PAPER_BUILD}" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
              echo "versioned_tag=${MINECRAFT_VERSION}-paper-${PAPER_BUILD}" >> "$GITHUB_OUTPUT"
              ;;
            fabric)
              echo "dockerfile=game/minecraft/fabric/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "build_args<<EOF" >> "$GITHUB_OUTPUT"
              echo "MINECRAFT_VERSION=${MINECRAFT_VERSION}" >> "$GITHUB_OUTPUT"
              echo "FABRIC_LOADER_VERSION=${FABRIC_LOADER_VERSION}" >> "$GITHUB_OUTPUT"
              echo "FABRIC_INSTALLER_VERSION=${FABRIC_INSTALLER_VERSION}" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
              echo "versioned_tag=${MINECRAFT_VERSION}-fabric-${FABRIC_LOADER_VERSION}" >> "$GITHUB_OUTPUT"
              echo "pinned_tag=${MINECRAFT_VERSION}-fabric-loader-${FABRIC_LOADER_VERSION}-installer-${FABRIC_INSTALLER_VERSION}" >> "$GITHUB_OUTPUT"
              ;;
            forge)
              echo "dockerfile=game/minecraft/forge/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "build_args<<EOF" >> "$GITHUB_OUTPUT"
              echo "MINECRAFT_VERSION=${MINECRAFT_VERSION}" >> "$GITHUB_OUTPUT"
              echo "FORGE_VERSION=${FORGE_VERSION}" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
              echo "versioned_tag=${MINECRAFT_VERSION}-forge-${FORGE_VERSION}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          no-cache: true
          push: true
          file: ${{ steps.pins.outputs.dockerfile }}
          build-args: ${{ steps.pins.outputs.build_args }}
          tags: |
            servertimeio/minecraft:${{ steps.pins.outputs.versioned_tag }}
            ${{ steps.pins.outputs.pinned_tag && format('servertimeio/minecraft:{0}', steps.pins.outputs.pinned_tag) || '' }}
